# This workflow will install Python dependencies, run tests and lint with a variety of Python versions
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions

name: Tests

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main

permissions:
  contents: read

env:
  MINIMUM_PYTHON_VERSION: "3.10"
  UV_VERSION: "0.11.2"

jobs:
  build:

    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        # https://github.com/actions/python-versions/blob/main/versions-manifest.json
        python-version: ["3.10", "3.11", "3.13"] # "3.14-dev"
        env:
          - MINIMAL: "true"
            PROXY_TEST: "false"
          - MINIMAL: "false"
            PROXY_TEST: "true"
        include:
          # custom python versions
          # - os: ubuntu-24.04
          #   python-version: 3.8
          # - os: macos-13
          #   python-version: 3.8
          - os: macos-latest
            python-version: "3.10"
          - os: windows-latest
            python-version: "3.10"
          - os: ubuntu-latest
            python-version: "3.12"
    services:
      socks_proxy:
        image: ${{ matrix.os == 'ubuntu-latest' && 'serjs/go-socks5-proxy' || '' }}
        ports:
          - 1080:1080
      socks_proxy_auth:
        image: ${{ matrix.os == 'ubuntu-latest' && 'serjs/go-socks5-proxy' || '' }}
        env:
          PROXY_USER: user
          PROXY_PASSWORD: pass
        ports:
          - 1081:1080

    steps:
      # Python and pip setup
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # 7.3.1
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      # package setup
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v5.0.0
        with:
          persist-credentials: false

      - name: Install dependencies
        run: uv sync --dev

      # - name: Lint with flake8
      #   run: |
      #     # stop the build if there are Python syntax errors or undefined names
      #     flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
      #     # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
      #     flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      # pycurl installation fix
      - name: Install packages required by pycurl
        if: ${{ matrix.env.MINIMAL == 'false' }}
        run: |
          sudo apt-get update
          sudo apt-get install libcurl4-gnutls-dev libgnutls28-dev
      # alternatively: sudo apt-get install libcurl4-openssl-dev libssl-dev

      - name: Install full dependencies
        if: ${{ matrix.env.MINIMAL == 'false' }}
        run: uv sync --dev --extra all

      - name: Type checking
        if: ${{ matrix.env.MINIMAL == 'false' && matrix.python-version == '3.13' }}
        continue-on-error: true
        run: |
          uv run ty check trafilatura

      - name: Test with pytest
        run: |
          uv run pytest --cov=./ --cov-report=xml
        env:
          PROXY_TEST: ${{ matrix.env.PROXY_TEST }}

      # coverage
      - name: Upload coverage to Codecov
        if: ${{ matrix.env.MINIMAL == 'false' && matrix.python-version == '3.13' }}
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          fail_ci_if_error: true
          files: ./coverage.xml
          verbose: true
